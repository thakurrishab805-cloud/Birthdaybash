<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Someone Special ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&family=Great+Vibes&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper/swiper-bundle.min.css"/>
<link rel="stylesheet" href="style.css">
</head>

<body>

<canvas id="confetti"></canvas>

<div class="swiper mySwiper">
  <div class="swiper-wrapper">

    <div class="swiper-slide slide1">
      <h1 class="script-text">Hey...</h1>
      <p id="typing1" class="typing"></p>
    </div>

    <div class="swiper-slide slide2">
      <div class="envelope" onclick="openEnvelope(this)"></div>
      <p>Tap to open 💌</p>
    </div>

    <div class="swiper-slide slide3">
      <h1 class="fade">Happy Birthday 🎉</h1>
      <img src="assets/photo1.jpg">
    </div>

    <div class="swiper-slide slide4">
      <p id="typing2" class="typing"></p>
    </div>

    <div class="swiper-slide slide5">
      <h1 class="script-text fade">Chapter 22 begins ✨</h1>
    </div>

  </div>
</div>

<audio id="music" loop>
  <source src="assets/music.mp3" type="audio/mpeg">
</audio>

<div id="musicControl">🔇 Tap for sound</div>

<script src="https://cdn.jsdelivr.net/npm/swiper/swiper-bundle.min.js"></script>
<script src="script.js"></script>

</body>
</html>
